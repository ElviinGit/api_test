[pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    
# Markers
markers =
    smoke: Smoke tests
    sanity: Sanity tests
    regression: Regression tests
    slow: Slow tests
    
# Logging
log_cli = true
log_cli_level = INFO
log_file = logs/pytest.log
